server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: student-service
          uri: lb://student-service
          predicates:
            - Path=/api/student/**
          filters:
            - StripPrefix=2

        - id: book-service
          uri: lb://book-service
          predicates:
            - Path=/api/book/**
          filters:
            - StripPrefix=2

        - id: loan-service
          uri: lb://loan-service
          predicates:
            - Path=/api/loan/**
          filters:
            - StripPrefix=2

        - id: student-service-docs
          uri: lb://student-service
          predicates:
            - Path=/aggregate/student-service/v3/api-docs
          filters:
            - RewritePath=/aggregate/student-service/(?<remaining>.*), /$\{remaining}

        - id: book-service-docs
          uri: lb://book-service
          predicates:
            - Path=/aggregate/book-service/v3/api-docs
          filters:
            - RewritePath=/aggregate/book-service/(?<remaining>.*), /$\{remaining}

        - id: loan-service-docs
          uri: lb://loan-service
          predicates:
            - Path=/aggregate/loan-service/v3/api-docs
          filters:
            - RewritePath=/aggregate/loan-service/(?<remaining>.*), /$\{remaining}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: student-service
        url: /aggregate/student-service/v3/api-docs
      - name: book-service
        url: /aggregate/book-service/v3/api-docs
      - name: loan-service
        url: /aggregate/loan-service/v3/api-docs
